<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page Not Found — Open Notebook Guide</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
<link rel="icon" type="image/png" sizes="48x48" href="/assets/favicon-48.png">
<link rel="icon" type="image/png" sizes="96x96" href="/assets/favicon-96.png">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<noscript><link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet"></noscript>
<style>
:root {
  --bg: #0d1117; --surface: #161b22; --border: #30363d;
  --text: #c9d1d9; --muted: #8b949e; --accent: #58a6ff;
  --ok: #3fb950; --radius: 6px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Google Sans', 'Roboto', -apple-system, sans-serif;
  background: var(--bg); color: var(--text);
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 100vh; padding: 2rem;
  text-align: center;
}
h1 { font-size: 4rem; margin-bottom: .5rem; }
p { color: var(--muted); margin-bottom: 1.5rem; }
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }
.btn {
  display: inline-block; padding: .6rem 1.4rem; border-radius: var(--radius);
  font-size: .9rem; font-weight: 500; text-decoration: none;
  background: var(--accent); color: #fff; transition: all .15s;
}
.btn:hover { background: #4090e0; text-decoration: none; }
</style>
</head>
<body>
<h1>404</h1>
<p>This page doesn't exist. Maybe it never did.</p>
<a href="/" class="btn">Back to Home</a>
</body>
</html>
